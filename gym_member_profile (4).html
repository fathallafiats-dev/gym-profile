<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بروفيل المشترك - جيم</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0D1B2A 0%, #1F3864 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }
  .gym-logo { font-size: 48px; margin-bottom: 8px; }
  .gym-title { font-size: 22px; font-weight: 700; color: #1F3864; margin-bottom: 4px; }
  .gym-sub { font-size: 13px; color: #888; margin-bottom: 28px; }
  .avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, #2E75B6, #00B0F0);
    color: white; font-size: 28px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .member-name { font-size: 20px; font-weight: 700; color: #1F3864; margin-bottom: 6px; }
  .member-code {
    font-size: 13px; color: #666; background: #EBF3FB;
    display: inline-block; padding: 4px 14px; border-radius: 20px; margin-bottom: 6px;
  }
  .member-job { font-size: 13px; color: #888; margin-bottom: 20px; }
  .status-badge {
    display: inline-block; background: #C6EFCE; color: #276221;
    font-size: 12px; font-weight: 600; padding: 4px 14px;
    border-radius: 20px; margin-bottom: 24px;
  }
  .divider { height: 1px; background: #eee; margin: 20px 0; }
  .qr-label { font-size: 13px; color: #888; margin-bottom: 16px; }
  #qrcode {
    display: flex; justify-content: center; margin-bottom: 20px;
  }
  #qrcode canvas {
    border-radius: 12px;
    border: 4px solid #EBF3FB;
    padding: 8px;
  }
  .share-btn {
    background: linear-gradient(135deg, #1F3864, #2E75B6);
    color: white; border: none; border-radius: 12px;
    padding: 12px 28px; font-size: 14px; font-weight: 600;
    cursor: pointer; width: 100%; font-family: inherit;
  }
  .share-btn:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="card">
  <div class="gym-logo">🏋️</div>
  <div class="gym-title">حجوزات الجيم</div>
  <div class="gym-sub">بطاقة المشترك الرسمية</div>
  <div id="content"></div>
</div>

<script>
const members = [
  {code:"1591",  name:"اسامه اسماعيل محمد بيومى",          job:"مدير فرع"},
  {code:"204",   name:"محمد عبد الفتاح صالح عبيد",           job:"محاسب شيكات"},
  {code:"191",   name:"احمد محمد احمد محمد الشافعى",          job:"رئيس حسابات التوجيه المحاسبي"},
  {code:"10429", name:"عبد الحميد عيد أحمد",                 job:"مدير كاشير"},
  {code:"5790",  name:"محمد السيد مسعد محمد ابراهيم",         job:"مسئول موارد بشرية"},
  {code:"11446", name:"طارق محمد اسماعيل محمد",              job:"اخصائى فعاليات"},
  {code:"57",    name:"كريم عبد الرحمن يوسف عبد الفتاح",      job:"مشرف متابعة - الموارد البشرية"},
  {code:"16441", name:"احمد جمال محمد عبد الراضى",            job:"سموحة"},
  {code:"14780", name:"خالد محمد عبد اللطيف ابو النور احمد",  job:"فرد أمن"},
  {code:"13878", name:"ادهم لطفى على حسين",                  job:"اخصائى فعاليات"},
  {code:"754",   name:"ايمن عبد الله احمد عيد",               job:"الإدارات المركزية"},
  {code:"256",   name:"هشام وحيد سعيد ابراهيم",               job:"الإدارات المركزية"},
  {code:"1459",  name:"محمد يحيى امين منصور",                 job:"مسئول خدمات اجتماعية"},
  {code:"7102",  name:"ناصف صلاح كامل محمد حسن",              job:"الشئون الادارية"},
  {code:"230",   name:"اسامه محمد احمد مصطفى",                job:"محاسب شيكات"},
  {code:"17577", name:"عمرو محمد حسن حافظ",                   job:"اخصائي تصوير"},
  {code:"19542", name:"محمد احمد السيد",                       job:"مسؤول تشغيل سيارات"},
  {code:"9598",  name:"عبدالله احمد محمد",                     job:"اخصائي دعاية واعلان"},
  {code:"1756",  name:"محمد صالح محمد احمد",                   job:"الإدارات المركزية"},
  {code:"20644", name:"مازن خالد مسعد يوسف",                   job:"أخصائي دعم فني"},
  {code:"11448", name:"حسين محمد حسين محمد احمد",              job:"اخصائي شؤون ادارية"},
  {code:"11136", name:"محمد جابر عبده احمد",                   job:"ستانلي"},
  {code:"324119",name:"يوسف السيد احمد محمد احمد",              job:"طالب"},
];

function getInitials(name) {
  const parts = name.trim().split(' ');
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

const p = new URLSearchParams(window.location.search);
const code = p.get('code');
const nameParam = p.get('name');
let member = members.find(m => m.code === code);
if (!member && nameParam) member = members.find(m => m.name === decodeURIComponent(nameParam));

const displayName = member ? member.name : (nameParam ? decodeURIComponent(nameParam) : 'غير معروف');
const displayCode = member ? member.code : (code || '---');
const displayJob  = member ? member.job  : '';

document.getElementById('content').innerHTML = `
  <div class="avatar">${getInitials(displayName)}</div>
  <div class="member-name">${displayName}</div>
  <div class="member-code">كود: ${displayCode}</div>
  <div class="member-job">${displayJob}</div>
  <div class="status-badge">✅ مشترك نشط</div>
  <div class="divider"></div>
  <div class="qr-label">امسح الكود للتحقق من هوية المشترك</div>
  <div id="qrcode"></div>
  <button class="share-btn" onclick="shareProfile()">📤 مشاركة البطاقة</button>
`;

// Draw QR using pure canvas - no external library needed
function drawQR(canvasId, text) {
  // Use Google Charts QR API as image
  const img = document.createElement('img');
  const encoded = encodeURIComponent(`اسم: ${displayName} | كود: ${displayCode}`);
  img.src = `https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=${encoded}&choe=UTF-8&chld=H|1`;
  img.width = 200;
  img.height = 200;
  img.style.borderRadius = '12px';
  img.style.border = '4px solid #EBF3FB';
  img.style.padding = '8px';
  img.alt = 'QR Code';
  document.getElementById('qrcode').appendChild(img);
}

drawQR('qrcode', `اسم: ${displayName} | كود: ${displayCode}`);

function shareProfile() {
  if (navigator.share) {
    navigator.share({ title: 'بطاقة المشترك - جيم', url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('تم نسخ الرابط!');
  }
}
</script>
</body>
</html>
