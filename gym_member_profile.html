<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بروفيل المشترك - جيم</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #0D1B2A 0%, #1F3864 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: white; border-radius: 20px; padding: 40px 32px;
  max-width: 420px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center;
}
.gym-logo { font-size: 48px; margin-bottom: 8px; }
.gym-title { font-size: 22px; font-weight: 700; color: #1F3864; margin-bottom: 4px; }
.gym-sub { font-size: 13px; color: #888; margin-bottom: 28px; }
.avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, #2E75B6, #00B0F0);
  color: white; font-size: 28px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.member-name { font-size: 20px; font-weight: 700; color: #1F3864; margin-bottom: 6px; }
.member-code {
  font-size: 13px; color: #666; background: #EBF3FB;
  display: inline-block; padding: 4px 14px; border-radius: 20px; margin-bottom: 6px;
}
.member-job { font-size: 13px; color: #888; margin-bottom: 20px; }
.status-badge {
  display: inline-block; background: #C6EFCE; color: #276221;
  font-size: 12px; font-weight: 600; padding: 4px 14px;
  border-radius: 20px; margin-bottom: 24px;
}
.divider { height: 1px; background: #eee; margin: 20px 0; }
.qr-label { font-size: 13px; color: #888; margin-bottom: 16px; }
#qrcode { display: flex; justify-content: center; margin-bottom: 20px; }
#qrcode canvas { border-radius: 12px; border: 4px solid #EBF3FB; padding: 8px; }
.share-btn {
  background: linear-gradient(135deg, #1F3864, #2E75B6);
  color: white; border: none; border-radius: 12px;
  padding: 12px 28px; font-size: 14px; font-weight: 600;
  cursor: pointer; width: 100%; font-family: inherit;
}
.share-btn:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="card">
  <div class="gym-logo">🏋️</div>
  <div class="gym-title">حجوزات الجيم</div>
  <div class="gym-sub">بطاقة المشترك الرسمية</div>
  <div id="content"></div>
</div>

  for (var row = 0; row < count; row++) {
    for (var col = 0; col < count; col++) {
      ctx.fillStyle = qr.isDark(row, col) ? '#1F3864' : '#fff';
      ctx.fillRect(Math.round(col * px), Math.round(row * px), Math.ceil(px), Math.ceil(px));
    }
  }
}
